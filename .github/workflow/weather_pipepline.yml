name: Daily Weather Pipeline

on:
  # Runs every day at 20:00 Danish time.
  # Denmark uses CET (UTC+1) in winter and CEST (UTC+2) in summer.
  # Two cron entries cover both offsets so it always fires at 20:00 local time.
  schedule:
    - cron: "0 18 * * *"   # Summer: CEST (UTC+2) → 20:00 Copenhagen
    - cron: "0 19 * * *"   # Winter: CET  (UTC+1) → 20:00 Copenhagen

  # Allow manual runs from the Actions tab for testing
  workflow_dispatch:

# Required for pushing commits and deploying to GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  run-pipeline:
    name: Fetch Weather, Generate Poem & Publish
    runs-on: ubuntu-latest

    steps:
      # ── 1. Check out the repository ────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Python ───────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── 3. Cache pip dependencies ──────────────────────────────────────────
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # ── 4. Install dependencies ────────────────────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── 5. Restore the SQLite database from cache (persists across runs) ───
      - name: Restore database cache
        uses: actions/cache@v4
        with:
          path: weather_data.db
          key: weather-db-${{ github.run_id }}
          restore-keys: |
            weather-db-

      # ── 6. Step 1: Fetch and store weather data ────────────────────────────
      - name: Run weather data pipeline
        run: python data_storage.py

      # ── 7. Step 2: Generate the bilingual poem via Groq ───────────────────
      - name: Generate poem
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python main.py

      # ── 8. Step 3: Build the GitHub Pages site ─────────────────────────────
      - name: Build GitHub Pages site
        run: python generate_page.py

      # ── 9. Commit updated results back to the repository ───────────────────
      - name: Commit and push results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add poem_output.txt docs/index.html
          git diff --cached --quiet || git commit -m "Auto update: weather poem $(date -u +'%Y-%m-%d')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 10. Upload docs/ as the Pages artifact ─────────────────────────────
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  # ── Separate job required by the deploy-pages action ──────────────────────
  deploy-pages:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: run-pipeline

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4